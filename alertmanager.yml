# AlertManager Configuration for GridTokenX
# ═══════════════════════════════════════════════════════════════════════════════

global:
  # Global settings
  resolve_timeout: 5m
  smtp_smarthost: 'localhost:25'
  smtp_from: 'alertmanager@gridtokenx.local'

# Route tree configuration
route:
  # Default receiver
  receiver: 'default-receiver'
  
  # Group alerts by these labels
  group_by: ['alertname', 'job', 'severity']
  
  # Wait before sending the first notification
  group_wait: 30s
  
  # Wait before sending updated notifications
  group_interval: 5m
  
  # Wait before repeating notifications
  repeat_interval: 4h
  
  # Child routes
  routes:
    # Critical alerts - immediate notification
    - match:
        severity: critical
      receiver: 'critical-receiver'
      group_wait: 10s
      repeat_interval: 1h

    # High priority alerts
    - match:
        severity: high
      receiver: 'high-priority-receiver'
      group_wait: 1m
      repeat_interval: 2h

    # Trading related alerts
    - match:
        job: trading
      receiver: 'trading-receiver'

    # Benchmark alerts (lower priority)
    - match:
        job: benchmarks
      receiver: 'benchmark-receiver'
      repeat_interval: 24h

# Inhibition rules
inhibit_rules:
  # If a critical alert fires, suppress high severity
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'high'
    equal: ['alertname', 'job']

  # If a cluster-wide alert fires, suppress individual service alerts
  - source_match:
      scope: 'cluster'
    target_match:
      scope: 'service'
    equal: ['environment']

# Receivers
receivers:
  # Default receiver - logs only
  - name: 'default-receiver'
    webhook_configs:
      - url: 'http://host.docker.internal:8080/webhooks/alerts'
        send_resolved: true

  # Critical alerts - multiple channels
  - name: 'critical-receiver'
    webhook_configs:
      - url: 'http://host.docker.internal:8080/webhooks/critical'
        send_resolved: true
    # Add email, Slack, PagerDuty etc. for production
    # email_configs:
    #   - to: 'ops@gridtokenx.com'
    #     send_resolved: true

  # High priority receiver
  - name: 'high-priority-receiver'
    webhook_configs:
      - url: 'http://host.docker.internal:8080/webhooks/high-priority'
        send_resolved: true

  # Trading specific receiver
  - name: 'trading-receiver'
    webhook_configs:
      - url: 'http://host.docker.internal:8080/webhooks/trading'
        send_resolved: true

  # Benchmark receiver (low priority, daily digest)
  - name: 'benchmark-receiver'
    webhook_configs:
      - url: 'http://host.docker.internal:8080/webhooks/benchmarks'
        send_resolved: true

# Templates (optional)
templates:
  - '/etc/alertmanager/templates/*.tmpl'
